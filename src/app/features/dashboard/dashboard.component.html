<div class="app-shell">
  <aside class="app-rail">
    <a class="rail-brand" routerLink="/app/chats" aria-label="Connectly home">C</a>

    <nav aria-label="App navigation">
      <a routerLink="/app/chats" routerLinkActive="active" title="Chats">Chats</a>
      <a routerLink="/app/contacts" routerLinkActive="active" title="Contacts">Contacts</a>
      <a routerLink="/app/profile" routerLinkActive="active" title="Profile">Profile</a>
    </nav>

    <div class="rail-bottom">
      <a routerLink="/app/settings" routerLinkActive="active" title="Settings">Settings</a>
      <button type="button" title="Logout" (click)="logout()">Logout</button>
    </div>
  </aside>

  <main class="workspace">
    <router-outlet />
  </main>
</div>
