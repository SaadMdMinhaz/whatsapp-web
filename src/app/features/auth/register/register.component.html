<main class="auth-page register-page">
  <section class="auth-panel">
    <div class="brand-mark">C</div>
    <p class="eyebrow">Create workspace</p>
    <h1>Start your secure chat app</h1>
    <p class="lede">Register an admin user and enter the dashboard designed for real-time communication workflows.</p>
    <form (ngSubmit)="submit()" class="auth-form">
      <label>Full name<input [(ngModel)]="name" name="name" autocomplete="name" required /></label>
      <label>Email<input [(ngModel)]="email" name="email" type="email" autocomplete="email" required /></label>
      <label>Password<input [(ngModel)]="password" name="password" type="password" autocomplete="new-password" required /></label>
      <button class="primary-action" type="submit">Create account</button>
    </form>
    <p class="switch-copy">Already registered? <a routerLink="/login">Login</a></p>
  </section>
  <aside class="auth-visual"><div class="metrics-grid"><article><strong>JWT</strong><span>Access and refresh flow</span></article><article><strong>STOMP</strong><span>Live messaging ready</span></article><article><strong>Kafka</strong><span>Event-driven backend plan</span></article><article><strong>Admin</strong><span>Moderation controls</span></article></div></aside>
</main>
