version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: whatsapp-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourPassword123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourPassword123" -Q "SELECT 1" -C -No
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: whatsapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-server:
    build:
      context: ./whatsapp-auth
      dockerfile: Dockerfile
    container_name: whatsapp-auth-server
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=whatsapp_auth;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "YourPassword123"
      USER_SERVICE_BASE_URL: http://user-service:8081
    depends_on:
      sqlserver:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: whatsapp-user-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=whatsapp_users;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "YourPassword123"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      sqlserver:
        condition: service_healthy

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: whatsapp-chat-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=whatsapp_users;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "YourPassword123"
      GATEWAY_SERVICE_BASE_URL: http://gateway-service:8084
    depends_on:
      sqlserver:
        condition: service_healthy
      gateway-service:
        condition: service_started

  media-service:
    build:
      context: ./media-service
      dockerfile: Dockerfile
    container_name: whatsapp-media-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=whatsapp_users;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "YourPassword123"
      MEDIA_UPLOAD_DIR: /app/uploads
    volumes:
      - media-uploads:/app/uploads
    depends_on:
      sqlserver:
        condition: service_healthy

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: whatsapp-gateway-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./My project whatsapp
      dockerfile: Dockerfile
    container_name: whatsapp-frontend
    ports:
      - "4200:4200"
    depends_on:
      - auth-server
      - user-service
      - chat-service
      - media-service
      - gateway-service

volumes:
  sqlserver-data:
  redis-data:
  media-uploads:
